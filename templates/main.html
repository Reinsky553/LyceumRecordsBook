<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Книга рекордов лицея</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="pageIndicator" class="top-right-indicator"></div>
    <main class="main-area">
        <section class="book-scene">
            <div class="book" id="book">
                <div class="page static-left" id="leftPage"></div>
                <div class="page static-right" id="rightPage"></div>
                <div class="leaf" id="leaf">
                    <div class="leaf-front"></div>
                    <div class="leaf-back"></div>
                </div>
            </div>
        </section>
    </main>
    <div class="bottom-controls">
        <button id="prev">◀</button>
        <button id="goHome">🏠 Содержание</button>
    
        <div class="page-jump" style="display: flex; align-items: center; gap: 5px;">
            <input type="number" id="pageInput" placeholder="Стр..." min="1" style="width: 60px; padding: 8px; border-radius: 5px; border: none;">
            <button id="jumpBtn" style="padding: 8px 12px;">Перейти</button>
        </div>

        <button id="openSubmit">Предложить достижение</button>
        <button id="next">▶</button>
    </div>
    <div id="submitModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Предложить запись</h2>
            <form id="userSubmitForm">
                <input type="text" name="name" placeholder="Ваше ФИО" required>
                <input type="text" name="contact" placeholder="Ваш VK/Telegram/Email" required>
                <select name="category" id="categorySelect"></select>
                <textarea name="content" placeholder="Опишите достижение..." required></textarea>
                <button type="submit">Отправить</button>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
